<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPENCLAW HUD // KIMI K2.5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="chat-pane.css">
</head>
<body>
<div class="hex-bg"></div>

<header class="hud-header">
  <div>
    <div class="logo-glitch" data-text="OPENCLAW">OPENCLAW</div>
    <div class="hud-subtitle">KIMI K2.5 // COMMAND CENTER</div>
  </div>
  <div class="header-right">
    <div class="stat-block">
      <span class="stat-label">AGENTS</span>
      <span class="stat-value" id="stat-agents">—</span>
    </div>
    <div class="stat-block">
      <span class="stat-label">ACTIVE</span>
      <span class="stat-value neon-cyan" id="stat-active">—</span>
    </div>
    <div class="stat-block">
      <span class="stat-label">UPTIME</span>
      <span class="stat-value" id="stat-uptime">—</span>
    </div>
    <div class="header-divider"></div>
    <div style="text-align:right;">
      <div class="hud-time"><span class="hud-status-dot"></span><span id="clock"></span></div>
      <div class="hud-subtitle" id="sys-model" style="margin-top:4px;"></div>
    </div>
  </div>
</header>

<div class="hud-layout">
<main class="dashboard">
  <!-- Row 1: Overview panels -->
  <div class="row row-3">
    <div class="panel" id="p-agents">
      <div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div>
      <div class="panel-header">AGENT FLEET <span class="count" id="agent-count">0</span></div>
      <div class="panel-body">
        <input class="search-box" id="agent-search" placeholder="FILTER AGENTS...">
        <div id="agents-list"></div>
      </div>
    </div>

    <div class="panel" id="p-cron">
      <div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div>
      <div class="panel-header">CRON CONTROL <span class="count" id="cron-count">0</span></div>
      <div class="panel-body" id="cron-list"></div>
    </div>

    <div class="panel" id="p-system">
      <div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div>
      <div class="panel-header">SYSTEM STATUS</div>
      <div class="panel-body" id="system-info"></div>
    </div>
  </div>

  <!-- Row 2: Session Tree + Model Usage -->
  <div class="row row-2-wide">
    <div class="panel" id="p-tree">
      <div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div>
      <div class="panel-header"><span>SESSION TREE</span> <div style="display:flex;align-items:center;gap:12px;"><button class="spawn-btn" id="open-spawn-btn">+ NEW</button><span class="count" id="tree-count">0</span></div></div>
      <div class="panel-body" id="tree-body"></div>
    </div>

    <div class="panel" id="p-models">
      <div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div>
      <div class="panel-header">MODEL USAGE</div>
      <div class="panel-body" id="model-usage"></div>
    </div>
  </div>

  <!-- Row 3: Active Sessions + Activity Feed -->
  <div class="row row-2">
    <div class="panel" id="p-sessions">
      <div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div>
      <div class="panel-header">ACTIVE SESSIONS <span class="count" id="session-count">0</span></div>
      <div class="panel-body" id="sessions-list"></div>
    </div>

    <div class="panel" id="p-activity">
      <div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div>
      <div class="panel-header">ACTIVITY FEED <span class="count" id="activity-count">0</span></div>
      <div class="panel-body" id="activity-feed"></div>
    </div>
  </div>
</main>

<aside class="chat-pane" id="chat-pane">
  <div class="chat-header">
    <div class="chat-header-info">
      <span class="chat-status-dot"></span>
      <span class="chat-title" id="chat-title">Select a session</span>
      <span class="chat-live" id="chat-live">LIVE</span>
    </div>
    <button class="chat-close" id="chat-close" aria-label="Close chat pane">&times;</button>
  </div>
  <div class="chat-messages" id="chat-messages" role="log" aria-live="polite">
    <div class="chat-empty" id="chat-empty">Select a session from the tree</div>
  </div>
  <div class="chat-new-pill" id="chat-new-pill" style="display:none">New messages ↓</div>
</aside>
</div>

<!-- Cron Edit Modal -->
<div class="modal-overlay" id="cron-modal">
  <div class="modal-content cron-edit-modal">
    <div class="modal-header">
      <span>EDIT MISSION: <span id="cron-edit-name" style="color:var(--cyan)"></span></span>
      <span class="modal-close" id="cron-modal-close">&times;</span>
    </div>
    <div class="modal-body">
      <div class="form-grid cron-form-grid">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="cron-name" class="hud-input">
        </div>

        <div class="form-group">
          <label>Enabled</label>
          <label class="toggle">
            <input type="checkbox" id="cron-enabled">
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="form-group">
          <label>Agent ID</label>
          <select id="cron-agent" class="hud-select"></select>
        </div>

        <div class="form-group">
          <label>Session Target</label>
          <select id="cron-session-target" class="hud-select">
            <option value="main">Main (systemEvent)</option>
            <option value="isolated">Isolated (agentTurn)</option>
          </select>
        </div>

        <div class="form-group">
          <label>Schedule Type</label>
          <select id="cron-schedule-kind" class="hud-select">
            <option value="cron">Cron Expression</option>
            <option value="at">One-time (at)</option>
          </select>
        </div>

        <div class="form-group" id="cron-expr-group">
          <label>Cron Expression</label>
          <input type="text" id="cron-expr" class="hud-input" placeholder="0 8 * * *">
        </div>

        <div class="form-group" id="cron-tz-group">
          <label>Timezone</label>
          <input type="text" id="cron-tz" class="hud-input" placeholder="America/Chicago">
        </div>

        <div class="form-group" id="cron-at-group" style="display:none">
          <label>Run At</label>
          <input type="datetime-local" id="cron-at" class="hud-input">
        </div>

        <div class="form-group" id="cron-model-group">
          <label>Model</label>
          <select id="cron-model" class="hud-select"></select>
        </div>

        <div class="form-group" id="cron-timeout-group">
          <label>Timeout (seconds)</label>
          <input type="number" id="cron-timeout" class="hud-input" placeholder="300">
        </div>
      </div>

      <div class="form-group">
        <label id="cron-prompt-label">Prompt / Message</label>
        <textarea id="cron-prompt" class="hud-textarea" rows="6"></textarea>
      </div>

      <div class="form-actions">
        <button class="hud-btn hud-btn-cancel" onclick="closeCronModal()">CANCEL</button>
        <button class="hud-btn hud-btn-save" onclick="saveCronJob()">SAVE</button>
      </div>
    </div>
  </div>
</div>

<!-- Spawn Session Modal -->
<div class="modal-overlay" id="spawn-modal">
  <div class="modal-content spawn-modal-content">
    <div class="modal-header">
      <span>LAUNCH NEW SESSION</span>
      <span class="modal-close" id="spawn-modal-close">&times;</span>
    </div>
    <div class="modal-body">
      <div id="spawn-error" class="spawn-error" style="display:none"></div>

      <div class="form-grid spawn-form-grid">
        <div class="form-group">
          <label>Agent</label>
          <select id="spawn-agent" class="hud-select"></select>
        </div>
        <div class="form-group">
          <label>Model</label>
          <select id="spawn-model" class="hud-select"></select>
        </div>
        <div class="form-group">
          <label>Label <span class="label-hint">(optional)</span></label>
          <input type="text" id="spawn-label" class="hud-input" placeholder="my-research-task">
        </div>
        <div class="form-group">
          <label>Mode</label>
          <select id="spawn-mode" class="hud-select">
            <option value="run">Run (one-shot, executes and stops)</option>
            <option value="session">Session (persistent, accepts follow-ups)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Timeout <span class="label-hint">(seconds, 0 = no limit)</span></label>
          <input type="number" id="spawn-timeout" class="hud-input" value="300" min="0" max="7200">
        </div>
      </div>

      <div class="form-group" style="margin-top:16px;">
        <label>Context Files <span class="label-hint">(one path per line, optional)</span></label>
        <textarea id="spawn-files" class="hud-textarea" rows="3" placeholder="~/Development/project/src/main.js&#10;~/Development/project/README.md"></textarea>
      </div>

      <div class="form-group">
        <label>Task / Prompt</label>
        <textarea id="spawn-prompt" class="hud-textarea" rows="8" placeholder="Describe what the agent should do..."></textarea>
      </div>

      <div class="form-actions">
        <button class="hud-btn hud-btn-cancel" id="spawn-cancel-btn">CANCEL</button>
        <button class="hud-btn hud-btn-launch" id="spawn-launch-btn">LAUNCH</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div id="toast" class="toast"></div>

<script src="utils.js"></script>
<script src="chat-pane.js"></script>
<script src="app.js"></script>
</body>
</html>
