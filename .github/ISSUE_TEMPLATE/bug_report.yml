name: Bug Report
description: Report a reproducible bug in OpenClaw HUD
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps, including clicks/commands.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js Version
      placeholder: e.g. v22.0.0

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste server/browser logs. Redact tokens/secrets.
