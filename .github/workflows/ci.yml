name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Format Check
        run: npm run fmt:check

      - name: Lint
        run: npm run lint

      - name: Coverage
        run: npm run test:coverage

      - name: Bundle Analyze
        run: npm run bundle:analyze

  compatibility-node-20:
    name: Compatibility (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

  type-aware-alpha:
    name: Type-Aware Lint (Alpha, Non-Blocking)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Type-Aware Lint
        run: npm run lint:type-aware
