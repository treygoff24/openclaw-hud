name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
  schedule:
    - cron: "15 6 * * 1"

permissions:
  contents: read

jobs:
  quality-gates:
    name: Quality Gates
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Format Check
        run: npm run fmt:check

      - name: Lint
        run: npm run lint

      - name: Coverage
        run: npm run test:coverage

      - name: Bundle Analyze
        run: npm run bundle:analyze

  build-validation:
    name: Build Validation
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate Package Build/Payload
        run: npm pack --dry-run

  compatibility-node-20:
    name: Compatibility (Node 20)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

  e2e-smoke:
    name: E2E Smoke
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E PR Gate
        run: npm run test:e2e -- e2e/smoke.spec.js e2e/dashboard.spec.js e2e/chat-rich-content.spec.js e2e/resilience.spec.js e2e/models-live-weekly.spec.js

  e2e-full-scheduled:
    name: E2E Full (Scheduled)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Full E2E Suite
        run: npm run test:e2e

  architecture-gate:
    name: Architecture Gate (Specgate)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Specgate
        run: |
          TAG="v0.1.0"
          ASSET="specgate-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sL -o specgate.tar.gz \
            "https://github.com/treygoff24/specgate/releases/download/${TAG}/${ASSET}"
          tar xzf specgate.tar.gz
          chmod +x specgate
          ./specgate --version

      - name: Validate Specs
        run: ./specgate validate

      - name: Architecture Check
        run: ./specgate check

  security-audit-prod:
    name: Security Audit (Prod Deps)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Audit Production Dependencies
        run: npm audit --omit=dev --audit-level=high

  security-audit-full-scheduled:
    name: Security Audit (All Deps, Scheduled)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Audit All Dependencies
        run: npm audit --audit-level=high

  type-aware-lint:
    name: Type-Aware Lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Type-Aware Lint
        run: npm run lint:type-aware
