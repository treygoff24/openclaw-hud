name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  quick-checks:
    name: Quick Checks (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

  full-checks:
    name: Full Checks
    runs-on: ubuntu-latest
    needs: quick-checks
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Coverage
        run: npm run test:coverage

      - name: Bundle Analyze
        run: npm run bundle:analyze
